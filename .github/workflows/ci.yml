name: CI — PowerShell Lint

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: PSScriptAnalyzer
        runs-on: windows-latest
        timeout-minutes: 10

        steps:
            - name: Checkout repository
              uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

            - name: Install PSScriptAnalyzer
              shell: pwsh
              run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

            - name: Run PSScriptAnalyzer
              shell: pwsh
              run: |
                  $results = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Warning,Error
                  if ($results) {
                    $results | Format-Table -AutoSize
                    Write-Error "PSScriptAnalyzer found $($results.Count) issue(s). Please fix them."
                    exit 1
                  } else {
                    Write-Host "✅ PSScriptAnalyzer: No issues found." -ForegroundColor Green
                  }
